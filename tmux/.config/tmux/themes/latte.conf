# Catppuccin Latte (light)
set -g status-style "bg=#eff1f5,fg=#4c4f69"
set -g status-left " #[fg=#1e66f5,bold]#S #[fg=#acb0be]| "
set -g status-right "#[fg=#acb0be]| #[fg=#40a02b]%H:%M #[fg=#acb0be]| #[fg=#1e66f5]%d %b "
set -g window-status-format "#[fg=#acb0be] #I:#W "
set -g window-status-current-format "#[fg=#4c4f69,bold,bg=#ccd0da] #I:#W "
set -g pane-border-style "fg=#ccd0da"
set -g pane-active-border-style "fg=#1e66f5"
set -g message-style "bg=#ccd0da,fg=#4c4f69"
