format = """
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$cmd_duration\
$line_break\
$character"""

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[directory]
style = "bold blue"
truncation_length = 4
truncate_to_repo = true

[git_branch]
symbol = " "
style = "bold purple"
format = "on [$symbol$branch]($style) "

[git_status]
style = "red"
format = '([$all_status$ahead_behind]($style) )'
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
modified = "!${count}"
untracked = "?${count}"
staged = "+${count}"
stashed = ""

[python]
symbol = " "
format = 'via [$symbol($version )(\($virtualenv\) )]($style)'
style = "yellow"
detect_files = ["pyproject.toml", "requirements.txt", ".python-version", "*.py"]

[nodejs]
symbol = " "
format = "via [$symbol($version )]($style)"
style = "green"
detect_files = ["package.json", ".nvmrc"]
detect_folders = ["node_modules"]

[cmd_duration]
min_time = 2_000
format = "took [$duration](bold yellow) "

[line_break]
disabled = false
